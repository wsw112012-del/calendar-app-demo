<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Simple month-view calendar with event management">
  <meta name="theme-color" content="#4f8ef7">
  <title>Calendar</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%234f8ef7'/><rect x='6' y='10' width='20' height='16' rx='2' fill='white'/><rect x='6' y='6' width='20' height='7' rx='2' fill='%233a7be0'/><rect x='10' y='4' width='3' height='5' rx='1.5' fill='white'/><rect x='19' y='4' width='3' height='5' rx='1.5' fill='white'/><rect x='9' y='16' width='4' height='4' rx='1' fill='%234f8ef7'/><rect x='14' y='16' width='4' height='4' rx='1' fill='%234f8ef7'/><rect x='19' y='16' width='4' height='4' rx='1' fill='%234f8ef7'/></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header id="cal-header">
    <button id="btn-prev" aria-label="Previous month">&#8249;</button>
    <h1 id="month-label"></h1>
    <button id="btn-next" aria-label="Next month">&#8250;</button>
    <button id="btn-today">Today</button>
  </header>

  <div id="cal-dow-row" aria-hidden="true">
    <span>Sun</span>
    <span>Mon</span>
    <span>Tue</span>
    <span>Wed</span>
    <span>Thu</span>
    <span>Fri</span>
    <span>Sat</span>
  </div>

  <main id="cal-grid" role="grid" aria-label="Calendar"></main>

  <button id="btn-add-event" aria-label="Add event">+</button>

  <div id="modal-overlay" role="dialog" aria-modal="true"
       aria-labelledby="modal-title" hidden>
    <div id="modal-box">
      <h2 id="modal-title">Add Event</h2>

      <form id="event-form" novalidate>
        <div class="field-group">
          <label for="f-title">Title <span class="required" aria-hidden="true">*</span></label>
          <input id="f-title" type="text" required autocomplete="off" placeholder="Event title">
          <span class="field-error" id="err-title" role="alert" hidden></span>
        </div>

        <div class="field-group">
          <label for="f-date">Date <span class="required" aria-hidden="true">*</span></label>
          <input id="f-date" type="date" required>
          <span class="field-error" id="err-date" role="alert" hidden></span>
        </div>

        <div class="field-row">
          <div class="field-group">
            <label for="f-start">Start time</label>
            <input id="f-start" type="time">
          </div>
          <div class="field-group">
            <label for="f-end">End time</label>
            <input id="f-end" type="time">
          </div>
        </div>
        <span class="field-error" id="err-time" role="alert" hidden></span>

        <div class="field-group">
          <label for="f-desc">Description</label>
          <textarea id="f-desc" rows="3" placeholder="Optional description"></textarea>
        </div>

        <div class="field-group field-group--color">
          <label for="f-color">Color</label>
          <input id="f-color" type="color" value="#4f8ef7">
        </div>

        <div id="modal-actions">
          <button type="button" id="btn-delete" hidden>Delete</button>
          <button type="button" id="btn-cancel">Cancel</button>
          <button type="submit" id="btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
